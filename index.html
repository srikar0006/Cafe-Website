    <title>Aura Coffee Roasters | React</title>
    <meta name="description" content="Experience the finest artisanal coffee and pastries at Aura Coffee Roasters.">
    <script>
      (function () {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, '', redirect);
        }
      })();
    </script>
